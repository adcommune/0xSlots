name: DB Migrate

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/drizzle/**'

  workflow_dispatch:

defaults:
  run:
    working-directory: apps/api

jobs:
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
