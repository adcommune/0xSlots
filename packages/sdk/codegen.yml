schema: https://gateway.thegraph.com/api/subgraphs/id/Z361DLoMdPh9WAopH7shJP8WoXYAB9XeKrLUCTYjdZR
documents: ./src/queries/**/*.graphql
generates:
  ./src/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
    config:
      avoidOptionals: false
      maybeValue: T | null
      skipTypename: false
      enumsAsTypes: true
      scalars:
        BigInt: string
        Bytes: string
