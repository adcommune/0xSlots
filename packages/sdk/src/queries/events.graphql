# ── Currency fragment ──

fragment CurrencyFields on Currency {
  id
  name
  symbol
  decimals
}

# ── Global (explorer) ──

query GetRecentEvents($first: Int!) {
  boughtEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    buyer
    previousOccupant
    price
    selfAssessedPrice
    deposit
    timestamp
    tx
  }
  releasedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    occupant
    refund
    timestamp
    tx
  }
  liquidatedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    liquidator
    occupant
    bounty
    timestamp
    tx
  }
  priceUpdatedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    oldPrice
    newPrice
    timestamp
    tx
  }
  depositedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    depositor
    amount
    timestamp
    tx
  }
  withdrawnEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    occupant
    amount
    timestamp
    tx
  }
  taxCollectedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    currency { ...CurrencyFields }
    recipient
    amount
    timestamp
    tx
  }
  taxUpdateProposedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    newPercentage
    timestamp
    tx
  }
  moduleUpdateProposedEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    newModule
    timestamp
    tx
  }
  pendingUpdateCancelledEvents(first: $first, orderBy: timestamp, orderDirection: desc) {
    id
    slot { id }
    timestamp
    tx
  }
}

# ── Per-slot events ──

query GetBoughtEvents(
  $first: Int!
  $skip: Int
  $orderBy: BoughtEvent_orderBy
  $orderDirection: OrderDirection
  $where: BoughtEvent_filter
  $block: Block_height
) {
  boughtEvents(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: $where
    block: $block
  ) {
    id
    slot { id }
    currency { ...CurrencyFields }
    buyer
    previousOccupant
    price
    deposit
    selfAssessedPrice
    timestamp
    blockNumber
    tx
  }
}

