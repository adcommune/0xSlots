query GetBoughtEvents($slotId: String!, $first: Int!) {
  boughtEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    buyer
    previousOccupant
    price
    deposit
    selfAssessedPrice
    timestamp
    blockNumber
    tx
  }
}

query GetSettledEvents($slotId: String!, $first: Int!) {
  settledEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    taxOwed
    taxPaid
    depositRemaining
    timestamp
    tx
  }
}

query GetTaxCollectedEvents($slotId: String!, $first: Int!) {
  taxCollectedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    recipient
    amount
    timestamp
    tx
  }
}

query GetSlotActivity($slotId: String!, $first: Int!) {
  boughtEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    buyer
    previousOccupant
    price
    selfAssessedPrice
    timestamp
    tx
  }
  releasedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    occupant
    refund
    timestamp
    tx
  }
  liquidatedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    liquidator
    occupant
    bounty
    timestamp
    tx
  }
}
