# ── Per-slot activity (all event types) ──

query GetSlotActivity($slotId: String!, $first: Int!) {
  boughtEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    buyer
    previousOccupant
    price
    selfAssessedPrice
    deposit
    timestamp
    tx
  }
  releasedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    occupant
    refund
    timestamp
    tx
  }
  liquidatedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    liquidator
    occupant
    bounty
    timestamp
    tx
  }
  priceUpdatedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    oldPrice
    newPrice
    timestamp
    tx
  }
  depositedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    depositor
    amount
    timestamp
    tx
  }
  withdrawnEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    occupant
    amount
    timestamp
    tx
  }
  taxCollectedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    currency { ...CurrencyFields }
    recipient
    amount
    timestamp
    tx
  }
  taxUpdateProposedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    newPercentage
    timestamp
    tx
  }
  moduleUpdateProposedEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    newModule
    timestamp
    tx
  }
  pendingUpdateCancelledEvents(first: $first, orderBy: timestamp, orderDirection: desc, where: { slot: $slotId }) {
    id
    timestamp
    tx
  }
}
