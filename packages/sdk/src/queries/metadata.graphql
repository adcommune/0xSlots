fragment MetadataSlotFields on MetadataSlot {
  id
  uri
  rawJson
  adType
  updatedBy
  updateCount
  createdAt
  createdTx
  updatedAt
  updatedTx
  slot {
    id
    recipient
    occupant
    price
    deposit
    currency {
      id
      symbol
      decimals
    }
  }
}

query GetMetadataSlots($first: Int = 100, $skip: Int = 0, $orderBy: MetadataSlot_orderBy = updatedAt, $orderDirection: OrderDirection = desc, $where: MetadataSlot_filter) {
  metadataSlots(first: $first, skip: $skip, orderBy: $orderBy, orderDirection: $orderDirection, where: $where) {
    ...MetadataSlotFields
  }
}

query GetMetadataSlot($id: ID!) {
  metadataSlot(id: $id) {
    ...MetadataSlotFields
  }
}

query GetMetadataSlotsByRecipient($recipient: Bytes!, $first: Int = 100) {
  metadataSlots(first: $first, where: { slot_: { recipient: $recipient } }, orderBy: updatedAt, orderDirection: desc) {
    ...MetadataSlotFields
  }
}

query GetMetadataUpdatedEvents($first: Int = 50, $skip: Int = 0, $orderBy: MetadataUpdatedEvent_orderBy = timestamp, $orderDirection: OrderDirection = desc, $where: MetadataUpdatedEvent_filter) {
  metadataUpdatedEvents(first: $first, skip: $skip, orderBy: $orderBy, orderDirection: $orderDirection, where: $where) {
    id
    slot {
      id
    }
    author {
      id
      type
    }
    uri
    rawJson
    adType
    timestamp
    blockNumber
    tx
  }
}
