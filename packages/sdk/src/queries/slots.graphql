fragment SlotFields on Slot {
  id
  recipient
  recipientAccount { id type slotCount occupiedCount }
  currency { id name symbol decimals }
  manager
  mutableTax
  mutableModule
  taxPercentage
  module { id verified name version }
  occupant
  occupantAccount { id type slotCount occupiedCount }
  price
  deposit
  collectedTax
  totalCollected
  liquidationBountyBps
  minDepositSeconds
  createdAt
  createdTx
  updatedAt
}

query GetSlots(
  $first: Int!
  $skip: Int
  $orderBy: Slot_orderBy
  $orderDirection: OrderDirection
  $where: Slot_filter
  $block: Block_height
) {
  slots(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: $where
    block: $block
  ) {
    ...SlotFields
  }
}

query GetSlot($id: ID!, $block: Block_height) {
  slot(id: $id, block: $block) {
    ...SlotFields
  }
}

query GetSlotsByRecipient(
  $recipient: Bytes!
  $first: Int!
  $skip: Int
  $orderBy: Slot_orderBy
  $orderDirection: OrderDirection
  $block: Block_height
) {
  slots(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: { recipient: $recipient }
    block: $block
  ) {
    ...SlotFields
  }
}

query GetSlotsByOccupant(
  $occupant: Bytes!
  $first: Int!
  $skip: Int
  $orderBy: Slot_orderBy
  $orderDirection: OrderDirection
  $block: Block_height
) {
  slots(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: { occupant: $occupant }
    block: $block
  ) {
    ...SlotFields
  }
}
