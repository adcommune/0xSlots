fragment SlotFields on Slot {
  id
  recipient
  currency
  currencyName
  currencySymbol
  currencyDecimals
  manager
  mutableTax
  mutableModule
  taxPercentage
  module
  occupant
  price
  deposit
  collectedTax
  totalCollected
  liquidationBountyBps
  minDepositSeconds
  createdAt
  createdTx
  updatedAt
}

query GetSlots($first: Int!, $skip: Int) {
  slots(first: $first, skip: $skip, orderBy: createdAt, orderDirection: desc) {
    ...SlotFields
  }
}

query GetSlot($id: ID!) {
  slot(id: $id) {
    ...SlotFields
  }
}

query GetSlotsByRecipient($recipient: Bytes!, $first: Int!) {
  slots(first: $first, orderBy: createdAt, orderDirection: desc, where: { recipient: $recipient }) {
    ...SlotFields
  }
}

query GetSlotsByOccupant($occupant: Bytes!, $first: Int!) {
  slots(first: $first, orderBy: createdAt, orderDirection: desc, where: { occupant: $occupant }) {
    ...SlotFields
  }
}
