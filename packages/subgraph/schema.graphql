# ──────────────────────────────────────────
# 0xSlots v3 Subgraph Schema
# One slot = one contract (BeaconProxy)
# ──────────────────────────────────────────

type Factory @entity(immutable: false) {
  id: ID! # factory proxy address
  slotCount: BigInt!
  modules: [Module!]! @derivedFrom(field: "factory")
}

enum AccountType {
  EOA
  CONTRACT
  DELEGATED
  SPLIT
}

type Account @entity(immutable: false) {
  id: ID! # address (lowercase)
  type: AccountType!
  slotsAsRecipient: [Slot!]! @derivedFrom(field: "recipientAccount")
  slotsAsOccupant: [Slot!]! @derivedFrom(field: "occupantAccount")
  slotCount: Int!
  occupiedCount: Int!
}

type Currency @entity(immutable: true) {
  id: ID! # token address (lowercase)
  name: String
  symbol: String
  decimals: Int!
}

type Slot @entity(immutable: false) {
  id: ID! # slot contract address (lowercase)
  recipient: Bytes!
  recipientAccount: Account!
  currency: Currency!
  mutableTax: Boolean!
  mutableModule: Boolean!
  manager: Bytes!
  taxPercentage: BigInt!
  module: Module
  liquidationBountyBps: BigInt!
  minDepositSeconds: BigInt!
  occupant: Bytes # null = vacant
  occupantAccount: Account # null = vacant
  price: BigInt!
  deposit: BigInt!
  collectedTax: BigInt!
  totalCollected: BigInt!
  createdAt: BigInt!
  createdTx: Bytes!
  updatedAt: BigInt!
  metadata: MetadataSlot @derivedFrom(field: "slot")
  deployEvent: SlotDeployedEvent @derivedFrom(field: "slot")
  purchases: [BoughtEvent!]! @derivedFrom(field: "slot")
  releases: [ReleasedEvent!]! @derivedFrom(field: "slot")
  liquidations: [LiquidatedEvent!]! @derivedFrom(field: "slot")
  priceUpdates: [PriceUpdatedEvent!]! @derivedFrom(field: "slot")
  deposits: [DepositedEvent!]! @derivedFrom(field: "slot")
  withdrawals: [WithdrawnEvent!]! @derivedFrom(field: "slot")
  settlements: [SettledEvent!]! @derivedFrom(field: "slot")
  taxCollections: [TaxCollectedEvent!]! @derivedFrom(field: "slot")
  taxUpdateProposals: [TaxUpdateProposedEvent!]! @derivedFrom(field: "slot")
  moduleUpdateProposals: [ModuleUpdateProposedEvent!]!
    @derivedFrom(field: "slot")
  pendingUpdateCancellations: [PendingUpdateCancelledEvent!]!
    @derivedFrom(field: "slot")
  metadataUpdates: [MetadataUpdatedEvent!]! @derivedFrom(field: "slot")
}

# ──────────────────────────────────────────
# Metadata (mutable, one per slot with a MetadataModule)
# ──────────────────────────────────────────

type MetadataSlot @entity(immutable: false) {
  id: ID! # slot address (same as Slot.id)
  slot: Slot!
  uri: String!
  updatedBy: Bytes! # last address that set the URI
  updateCount: BigInt! # total number of URI changes
  createdAt: BigInt!
  createdTx: Bytes!
  updatedAt: BigInt!
  updatedTx: Bytes!
}

# ──────────────────────────────────────────
# Event Entities (immutable)
# ──────────────────────────────────────────

type SlotDeployedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  recipient: Bytes!
  currency: Currency!
  manager: Bytes!
  mutableTax: Boolean!
  mutableModule: Boolean!
  taxPercentage: BigInt!
  module: Bytes!
  liquidationBountyBps: BigInt!
  minDepositSeconds: BigInt!
  deployer: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type BoughtEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  buyer: Bytes!
  previousOccupant: Bytes!
  price: BigInt!
  deposit: BigInt!
  selfAssessedPrice: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type ReleasedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  occupant: Bytes!
  refund: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type LiquidatedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  liquidator: Bytes!
  occupant: Bytes!
  bounty: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type PriceUpdatedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  oldPrice: BigInt!
  newPrice: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type DepositedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  depositor: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type WithdrawnEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  occupant: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type SettledEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  taxOwed: BigInt!
  taxPaid: BigInt!
  depositRemaining: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type TaxCollectedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  currency: Currency!
  recipient: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type TaxUpdateProposedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  newPercentage: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type ModuleUpdateProposedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  newModule: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type PendingUpdateCancelledEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type MetadataUpdatedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  author: Account!
  uri: String!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type Module @entity(immutable: false) {
  id: ID! # module address
  factory: Factory!
  verified: Boolean!
  name: String!
  version: String!
}
