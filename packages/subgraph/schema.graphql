# ──────────────────────────────────────────
# 0xSlots v3 Subgraph Schema
# One slot = one contract (BeaconProxy)
# ──────────────────────────────────────────

type Factory @entity(immutable: false) {
  id: ID! # factory proxy address
  slotCount: BigInt!
  modules: [Module!]! @derivedFrom(field: "factory")
}

type Account @entity(immutable: false) {
  id: ID! # address (lowercase)
  slotsAsRecipient: [Slot!]! @derivedFrom(field: "recipientAccount")
  slotsAsOccupant: [Slot!]! @derivedFrom(field: "occupantAccount")
  slotCount: Int!
  occupiedCount: Int!
}

type Slot @entity(immutable: false) {
  id: ID! # slot contract address (lowercase)
  recipient: Bytes!
  recipientAccount: Account!
  currency: Bytes!
  currencyName: String
  currencySymbol: String
  currencyDecimals: Int
  mutableTax: Boolean!
  mutableModule: Boolean!
  manager: Bytes!
  taxPercentage: BigInt!
  module: Module
  liquidationBountyBps: BigInt!
  minDepositSeconds: BigInt!
  occupant: Bytes # null = vacant
  occupantAccount: Account # null = vacant
  price: BigInt!
  deposit: BigInt!
  collectedTax: BigInt!
  totalCollected: BigInt!
  createdAt: BigInt!
  createdTx: Bytes!
  updatedAt: BigInt!
  purchases: [BoughtEvent!]! @derivedFrom(field: "slot")
  releases: [ReleasedEvent!]! @derivedFrom(field: "slot")
  liquidations: [LiquidatedEvent!]! @derivedFrom(field: "slot")
  priceUpdates: [PriceUpdatedEvent!]! @derivedFrom(field: "slot")
  deposits: [DepositedEvent!]! @derivedFrom(field: "slot")
  withdrawals: [WithdrawnEvent!]! @derivedFrom(field: "slot")
  settlements: [SettledEvent!]! @derivedFrom(field: "slot")
  taxCollections: [TaxCollectedEvent!]! @derivedFrom(field: "slot")
  taxUpdateProposals: [TaxUpdateProposedEvent!]! @derivedFrom(field: "slot")
  moduleUpdateProposals: [ModuleUpdateProposedEvent!]! @derivedFrom(field: "slot")
  pendingUpdateCancellations: [PendingUpdateCancelledEvent!]! @derivedFrom(field: "slot")
}

# ──────────────────────────────────────────
# Event Entities (immutable)
# ──────────────────────────────────────────

type BoughtEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  buyer: Bytes!
  previousOccupant: Bytes!
  price: BigInt!
  deposit: BigInt!
  selfAssessedPrice: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type ReleasedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  occupant: Bytes!
  refund: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type LiquidatedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  liquidator: Bytes!
  occupant: Bytes!
  bounty: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type PriceUpdatedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  oldPrice: BigInt!
  newPrice: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type DepositedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  depositor: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type WithdrawnEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  occupant: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type SettledEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  taxOwed: BigInt!
  taxPaid: BigInt!
  depositRemaining: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type TaxCollectedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  recipient: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type TaxUpdateProposedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  newPercentage: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type ModuleUpdateProposedEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  newModule: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type PendingUpdateCancelledEvent @entity(immutable: true) {
  id: ID!
  slot: Slot!
  timestamp: BigInt!
  blockNumber: BigInt!
  tx: Bytes!
}

type Module @entity(immutable: false) {
  id: ID! # module address
  factory: Factory!
  verified: Boolean!
  name: String!
  version: String!
}
