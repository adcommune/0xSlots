specVersion: 1.0.0
features:
  - ipfsOnEthereumContracts
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SlotFactory
    network: {{network}}
    source:
      address: "{{factoryAddress}}"
      abi: SlotFactory
      startBlock: {{startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Factory
        - Slot
        - Module
      abis:
        - name: SlotFactory
          file: ./abis/SlotFactory.json
        - name: Slot
          file: ./abis/Slot.json
        - name: ERC20
          file: ./abis/ERC20.json
        - name: SplitV2
          file: ./abis/SplitV2.json
      eventHandlers:
        - event: SlotDeployed(indexed address,indexed address,indexed address,(bool,bool,address),(uint256,address,uint256,uint256))
          handler: handleSlotDeployed
        - event: ModuleVerified(indexed address,bool,string,string)
          handler: handleModuleVerified
        - event: AdminTransferred(indexed address,indexed address)
          handler: handleAdminTransferred
      file: ./src/factory.ts
  - kind: ethereum
    name: SlotFactory2
    network: {{network}}
    source:
      address: "{{factory2Address}}"
      abi: SlotFactory
      startBlock: {{factory2StartBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Factory
        - Slot
        - Module
      abis:
        - name: SlotFactory
          file: ./abis/SlotFactory.json
        - name: Slot
          file: ./abis/Slot.json
        - name: ERC20
          file: ./abis/ERC20.json
        - name: SplitV2
          file: ./abis/SplitV2.json
      eventHandlers:
        - event: SlotDeployed(indexed address,indexed address,indexed address,(bool,bool,address),(uint256,address,uint256,uint256))
          handler: handleSlotDeployed
        - event: ModuleVerified(indexed address,bool,string,string)
          handler: handleModuleVerified
        - event: AdminTransferred(indexed address,indexed address)
          handler: handleAdminTransferred
      file: ./src/factory.ts
  - kind: ethereum
    name: ERC721SlotsFactory
    network: {{network}}
    source:
      address: "{{erc721FactoryAddress}}"
      abi: ERC721SlotsFactory
      startBlock: {{erc721StartBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NFTCollection
      abis:
        - name: ERC721SlotsFactory
          file: ./abis/ERC721SlotsFactory.json
        - name: ERC721Slots
          file: ./abis/ERC721Slots.json
      eventHandlers:
        - event: CollectionDeployed(indexed address,indexed address,indexed address,string,string,address)
          handler: handleCollectionDeployed
      file: ./src/erc721slots-factory.ts
templates:
  - kind: ethereum
    name: Slot
    network: {{network}}
    source:
      abi: Slot
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Slot
        - BoughtEvent
        - ReleasedEvent
        - LiquidatedEvent
        - PriceUpdatedEvent
        - DepositedEvent
        - WithdrawnEvent
        - SettledEvent
        - TaxCollectedEvent
      abis:
        - name: Slot
          file: ./abis/Slot.json
        - name: SplitV2
          file: ./abis/SplitV2.json
      eventHandlers:
        - event: Bought(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleBought
        - event: Released(indexed address,uint256)
          handler: handleReleased
        - event: Liquidated(indexed address,indexed address,uint256)
          handler: handleLiquidated
        - event: PriceUpdated(uint256,uint256)
          handler: handlePriceUpdated
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: Settled(uint256,uint256,uint256)
          handler: handleSettled
        - event: TaxCollected(indexed address,uint256)
          handler: handleTaxCollected
        - event: TaxUpdateProposed(uint256)
          handler: handleTaxUpdateProposed
        - event: ModuleUpdateProposed(address)
          handler: handleModuleUpdateProposed
        - event: PendingUpdateApplied(uint256,address)
          handler: handlePendingUpdateApplied
        - event: LiquidationBountyUpdated(uint256)
          handler: handleLiquidationBountyUpdated
      file: ./src/slot.ts
  - kind: ethereum
    name: MetadataModule
    network: {{network}}
    source:
      abi: MetadataModule
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MetadataSlot
        - MetadataUpdatedEvent
      abis:
        - name: MetadataModule
          file: ./abis/MetadataModule.json
      eventHandlers:
        - event: MetadataUpdated(indexed address,string)
          handler: handleMetadataUpdated
      file: ./src/metadata.ts
  - kind: ethereum
    name: ERC721Slots
    network: {{network}}
    source:
      abi: ERC721Slots
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NFTToken
        - NFTCollection
      abis:
        - name: ERC721Slots
          file: ./abis/ERC721Slots.json
      eventHandlers:
        - event: TokenMinted(indexed uint256,indexed address,string)
          handler: handleTokenMinted
      file: ./src/erc721slots.ts
